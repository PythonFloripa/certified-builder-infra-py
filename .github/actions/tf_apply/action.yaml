name: 'Terraform Apply'
inputs:
  working-directory:
    description: 'Directory to run Terraform commands in.'
    required: true
  env:
    description: 'Environment name for logging.'
    required: true
runs:
  using: 'composite'
  steps:

    - name: Terraform Init
      run: |
        echo "[INFO] Initializing Terraform in ${{ inputs.working-directory }}..."
        terraform init -input=false -upgrade=false
        echo "[INFO] Terraform init completed."
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Terraform Plan
      run: terraform plan -input=false -out=tfplan
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Terraform Apply
      run: |
        set -euo pipefail
        echo "[INFO] Applying changes for ${{ inputs.env }}..."
        terraform apply -auto-approve -input=false tfplan
        echo "✅ Apply completed for ${{ inputs.env }}"
      working-directory: ${{ inputs.working-directory }}
      shell: bash
