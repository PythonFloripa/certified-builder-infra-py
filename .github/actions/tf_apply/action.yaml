name: 'Terraform Apply'
inputs:
  working-directory:
    description: 'Directory to run Terraform commands in.'
    required: true
  env:
    description: 'Environment name for logging.'
    required: true
runs:
  using: 'composite'
  steps:

    - name: Terraform Init
      run: |
        echo "[INFO] Initializing Terraform in ${{ inputs.working-directory }}..."
        terraform init -input=false -upgrade=false
        echo "[INFO] Terraform init completed."
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Terraform Validate
      run: |
        echo "[INFO] Validating Terraform configuration in ${{ inputs.working-directory }}..."
        terraform validate
        echo "[INFO] Terraform validate completed."
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      continue-on-error: true

    - name: Terraform Format Check
      run: |
        echo "[INFO] Checking Terraform formatting in ${{ inputs.working-directory }}..."
        terraform fmt -check
        echo "[INFO] Terraform format check completed."
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      continue-on-error: true

    - name: Delete image-based Lambdas before ZIP migration
      if: inputs.env == 'dev'
      run: |
        set -euo pipefail

        migrate_lambda() {
          local function_name="$1"
          local package_type

          package_type="$(aws lambda get-function-configuration \
            --function-name "$function_name" \
            --query 'PackageType' \
            --output text 2>/dev/null || true)"

          if [ -z "$package_type" ] || [ "$package_type" = "None" ]; then
            echo "[INFO] Function $function_name not found. Nothing to migrate."
            return 0
          fi

          if [ "$package_type" != "Image" ]; then
            echo "[INFO] Function $function_name already uses package type $package_type. Skipping deletion."
            return 0
          fi

          echo "[INFO] Deleting image-based function $function_name so Terraform can recreate it as ZIP..."
          aws lambda delete-function --function-name "$function_name"

          for attempt in $(seq 1 30); do
            if ! aws lambda get-function --function-name "$function_name" >/dev/null 2>&1; then
              echo "[INFO] Function $function_name deleted."
              return 0
            fi
            echo "[INFO] Waiting for $function_name deletion to complete ($attempt/30)..."
            sleep 10
          done

          echo "[ERROR] Timed out waiting for $function_name deletion."
          exit 1
        }

        migrate_lambda "tech-floripa-certificates-api-dev"
        migrate_lambda "tech-floripa-certificates-builder-dev"
        migrate_lambda "tech-floripa-certificates-notification-dev"
      shell: bash

    - name: Terraform Plan
      run: |
        echo "[INFO] Running Terraform plan in ${{ inputs.working-directory }}..."
        terraform plan -input=false -out=tfplan
        echo "[INFO] Terraform plan completed."
      working-directory: ${{ inputs.working-directory }}
      shell: bash

    - name: Terraform Apply
      run: |
        set -euo pipefail
        echo "[INFO] Applying changes for ${{ inputs.env }} in ${{ inputs.working-directory }}..."
        terraform apply -auto-approve -input=false tfplan
        echo "✅ Apply completed for ${{ inputs.env }} in ${{ inputs.working-directory }}"
      working-directory: ${{ inputs.working-directory }}
      shell: bash
