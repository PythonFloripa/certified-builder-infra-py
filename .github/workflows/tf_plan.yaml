name: Terraform Plan (PR)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - 'main'
  workflow_dispatch:

env:
  TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_github_actions_role_arn: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
  TF_VAR_service_url_registration_api_solana: ${{ secrets.SERVICE_URL_REGISTRATION_API_SOLANA }}
  TF_VAR_service_api_key_registration_api_solana: ${{ secrets.SERVICE_API_KEY_REGISTRATION_API_SOLANA }}
  TF_VAR_tech_floripa_certificate_validate_url: ${{ secrets.TECH_FLORIPA_CERTIFICATE_VALIDATE_URL }}
  TF_VAR_api_key_value: ${{ secrets.API_KEY_VALUE }}
  TFPLAN_S3_BUCKET: tech-floripa-plan-artifacts

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_VAR_github_actions_role_arn }}
          aws-region: ${{ env.TF_VAR_aws_region }}
          role-session-name: TerraformPlanSession

      - name: Terraform Init
        run: terraform init -input=false -upgrade=false
        working-directory: terraform

      - name: Terraform Plan
        run: |
          set -euo pipefail
          terraform plan -input=false -out=tfplan
          terraform show -no-color tfplan > plan-output.txt
          echo "## Terraform Plan" > plan-comment.md
          echo '```hcl' >> plan-comment.md
          cat plan-output.txt >> plan-comment.md
          echo '```' >> plan-comment.md
        working-directory: terraform

      - name: Comment PR
        if: github.event.pull_request.number
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: terraform/plan-comment.md

      - name: Upload Plan to S3
        if: github.event.pull_request.number
        run: |
          aws s3 cp terraform/tfplan \
            s3://${{ env.TFPLAN_S3_BUCKET }}/${{ github.event.pull_request.number }}/tfplan

