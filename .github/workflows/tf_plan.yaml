name: Terraform Plan (PR)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - 'main'

env:
  TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_github_actions_role_arn: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
  TF_VAR_service_url_registration_api_solana: ${{ secrets.SERVICE_URL_REGISTRATION_API_SOLANA }}
  TF_VAR_service_api_key_registration_api_solana: ${{ secrets.SERVICE_API_KEY_REGISTRATION_API_SOLANA }}
  TF_VAR_tech_floripa_certificate_validate_url: ${{ secrets.TECH_FLORIPA_CERTIFICATE_VALIDATE_URL }}
  TF_VAR_api_key_value: ${{ secrets.API_KEY_VALUE }}
  TFPLAN_S3_BUCKET: tech-floripa-plan-artifacts
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed Terraform directories
        id: set-matrix
        run: |
          FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path')

          MATRIX="[]"

          if echo "$FILES" | grep -q "^terraform/env/dev/"; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"dir":"terraform/env/dev","env":"dev"}]')
          fi

          if echo "$FILES" | grep "^terraform/" | grep -qv "^terraform/env/"; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"dir":"terraform","env":"shared"}]')
          fi

          echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT
          echo "Matrix: {\"include\":$MATRIX}"

  plan:
    needs: detect
    if: needs.detect.outputs.matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_VAR_github_actions_role_arn }}
          aws-region: ${{ env.TF_VAR_aws_region }}
          role-session-name: TerraformPlanSession-${{ matrix.env }}

      - name: Terraform Init
        run: terraform init -input=false -upgrade=false
        working-directory: ${{ matrix.dir }}

      - name: Terraform Plan
        run: |
          set -euo pipefail
          terraform plan -input=false -out=tfplan
          terraform show -no-color tfplan > plan-output.txt
          echo "## Terraform Plan (${{ matrix.env }})" > plan-comment.md
          echo '```hcl' >> plan-comment.md
          cat plan-output.txt >> plan-comment.md
          echo '```' >> plan-comment.md
        working-directory: ${{ matrix.dir }}

      - name: Comment PR
        if: github.event.pull_request.number
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: terraform-plan-${{ matrix.env }}
          recreate: true
          path: ${{ matrix.dir }}/plan-comment.md

      - name: Upload Plan to S3
        if: github.event.pull_request.number
        run: |
          aws s3 cp ${{ matrix.dir }}/tfplan \
            s3://${{ env.TFPLAN_S3_BUCKET }}/${{ matrix.env }}/${{ github.event.pull_request.number }}/tfplan
