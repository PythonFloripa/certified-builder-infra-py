name: Terraform Apply (Main)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_github_actions_role_arn: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
  TF_VAR_service_url_registration_api_solana: ${{ secrets.SERVICE_URL_REGISTRATION_API_SOLANA }}
  TF_VAR_service_api_key_registration_api_solana: ${{ secrets.SERVICE_API_KEY_REGISTRATION_API_SOLANA }}
  TF_VAR_tech_floripa_certificate_validate_url: ${{ secrets.TECH_FLORIPA_CERTIFICATE_VALIDATE_URL }}
  TF_VAR_api_key_value: ${{ secrets.API_KEY_VALUE }}
  TFPLAN_S3_BUCKET: tech-floripa-plan-artifacts

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get PR Number
        id: get_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr list --state merged --json number,mergeCommit --jq ".[] | select(.mergeCommit.oid == \"${{ github.sha }}\") | .number")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Detect changed Terraform directories from PR
        if: steps.get_pr.outputs.pr_number
        id: set-matrix
        run: |
          PR_NUMBER=${{ steps.get_pr.outputs.pr_number }}

          # Get changed files from the merged PR
          CHANGED_FILES=$(gh pr view $PR_NUMBER --json files --jq '.files[].path')

          DIRS=()

          # Check which terraform directories changed
          if echo "$CHANGED_FILES" | grep -q "^terraform/env/dev/"; then
            DIRS+=('{"dir":"terraform/env/dev","env":"dev","pr":"'$PR_NUMBER'"}')
          fi

          if echo "$CHANGED_FILES" | grep -q "^terraform/" | grep -qv "^terraform/env/"; then
            DIRS+=('{"dir":"terraform","env":"shared","pr":"'$PR_NUMBER'"}')
          fi

          # Build JSON matrix
          if [ ${#DIRS[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "No Terraform changes detected"
          else
            JSON="["
            for i in "${!DIRS[@]}"; do
              [ $i -gt 0 ] && JSON+=","
              JSON+="${DIRS[$i]}"
            done
            JSON+="]"
            echo "matrix={\"include\":$JSON}" >> $GITHUB_OUTPUT
            echo "Detected changes in: ${DIRS[@]}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  apply:
    needs: detect
    if: needs.detect.outputs.matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_VAR_github_actions_role_arn }}
          aws-region: ${{ env.TF_VAR_aws_region }}
          role-session-name: TerraformApplySession-${{ matrix.env }}

      - name: Terraform Init
        run: terraform init -input=false -upgrade=false
        working-directory: ${{ matrix.dir }}

      - name: Download and Verify Plan
        id: verify
        run: |
          set -euo pipefail

          # Download plan from S3
          aws s3 cp s3://${{ env.TFPLAN_S3_BUCKET }}/${{ matrix.env }}/${{ matrix.pr }}/tfplan tfplan

          # Generate fresh plan for comparison
          terraform plan -input=false -out=tfplan-new

          # Compare plans to detect drift
          terraform show -no-color tfplan > plan-old.txt
          terraform show -no-color tfplan-new > plan-new.txt

          if ! diff -q plan-old.txt plan-new.txt > /dev/null; then
            echo "ERROR: Plans differ - state has changed since PR"
            diff plan-old.txt plan-new.txt || true
            exit 1
          fi

          # Check if plan has no changes
          if grep -q "No changes" plan-old.txt; then
            echo "No changes detected in plan, skipping apply"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
        working-directory: ${{ matrix.dir }}

      - name: Terraform Apply
        if: steps.verify.outputs.has_changes == 'true'
        run: terraform apply -input=false tfplan
        working-directory: ${{ matrix.dir }}

