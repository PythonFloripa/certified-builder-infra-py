name: Terraform Plan (PR)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - 'main'
  workflow_dispatch:

env:
  TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_github_actions_role_arn: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
  TF_VAR_service_url_registration_api_solana: ${{ secrets.SERVICE_URL_REGISTRATION_API_SOLANA }}
  TF_VAR_service_api_key_registration_api_solana: ${{ secrets.SERVICE_API_KEY_REGISTRATION_API_SOLANA }}
  TF_VAR_tech_floripa_certificate_validate_url: ${{ secrets.TECH_FLORIPA_CERTIFICATE_VALIDATE_URL }}
  TF_VAR_api_key_value: ${{ secrets.API_KEY_VALUE }}


permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: Checkout and Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TF_VAR_github_actions_role_arn }}
          aws-region: ${{ env.TF_VAR_aws_region }}
          role-session-name: TerraformPlanSession

      - name: Check AWS Credentials
        run: aws sts get-caller-identity

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Log Tool Versions
        run: |
          echo "terraform: $(terraform version -json | jq -r '.terraform_version')"
          echo "aws CLI: $(aws --version)"

      - name: Terraform Init
        run: |
          set -euo pipefail
          echo "Starting Terraform initialization..."
          cd terraform
          if ! terraform init -input=false -upgrade=false; then
            echo "❌ ERROR: terraform init failed"
            exit 1
          fi
          echo "✅ Terraform initialized successfully"

      - name: Terraform Plan and Generate Markdown
        run: |
          set -euo pipefail
          echo "Generating Terraform plan..."
          cd terraform

          if ! terraform plan -input=false -out=tfplan; then
            echo "❌ ERROR: terraform plan failed"
            echo "Command: terraform plan -input=false -out=tfplan"
            exit 1
          fi
          echo "✅ Plan generated successfully"

          echo "Creating markdown comment..."
          # Create markdown file with header and code block
          echo "## :terraform: Terraform Plan Summary" > plan-comment.md
          echo "" >> plan-comment.md
          echo '```hcl' >> plan-comment.md
          terraform show -no-color tfplan | sed -n '/Terraform will perform the following actions:/,$p' >> plan-comment.md
          echo '```' >> plan-comment.md
          echo "✅ Markdown comment created"

      - name: Comment PR with Terraform Plan
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: terraform/plan-comment.md

      - name: Upload tfplan to S3
        run: |
          set -euo pipefail
          PR_NUMBER=${{ github.event.pull_request.number }}
          S3_PATH="s3://tech-floripa-plan-artifacts/$PR_NUMBER/tfplan"
          echo "Uploading plan to $S3_PATH..."

          if ! aws s3 cp terraform/tfplan "$S3_PATH"; then
            echo "❌ ERROR: Failed to upload plan to S3"
            echo "S3 Path: $S3_PATH"
            echo "Command failed: aws s3 cp terraform/tfplan $S3_PATH"
            exit 1
          fi

          echo "✅ Plan uploaded successfully to S3"
