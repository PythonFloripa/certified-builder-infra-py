name: Terraform Plan (PR)

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - 'main'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: Checkout and Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@main
        with:
          role-to-assume: "arn:aws:iam::334318883918:role/github-actions-terraform-role"
          aws-region: "us-east-1"
          role-session-name: TerraformPlanSession


      - name: Check AWS Credentials
        run: aws sts get-caller-identity
