name: Terraform Apply (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
  TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
  TF_VAR_github_actions_role_arn: ${{ secrets.GH_ACTIONS_ROLE_ARN }}
  TF_VAR_service_url_registration_api_solana: ${{ secrets.SERVICE_URL_REGISTRATION_API_SOLANA }}
  TF_VAR_service_api_key_registration_api_solana: ${{ secrets.SERVICE_API_KEY_REGISTRATION_API_SOLANA }}
  TF_VAR_tech_floripa_certificate_validate_url: ${{ secrets.TECH_FLORIPA_CERTIFICATE_VALIDATE_URL }}
  TF_VAR_api_key_value: ${{ secrets.API_KEY_VALUE }}

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GH_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: TerraformApplySession

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Required Tools
        run: |
          set -euo pipefail
          echo "Validating required tools..."
          if ! command -v terraform &> /dev/null; then
            echo "❌ ERROR: terraform binary not found in PATH"
            exit 1
          fi
          if ! command -v aws &> /dev/null; then
            echo "❌ ERROR: aws CLI not found in PATH"
            exit 1
          fi
          echo "✅ terraform version: $(terraform version -json | jq -r '.terraform_version')"
          echo "✅ aws CLI version: $(aws --version)"

      - name: Log Tool Versions
        run: |
          echo "terraform: $(terraform version -json | jq -r '.terraform_version')"
          echo "aws CLI: $(aws --version)"

      - name: Terraform Init
        run: |
          set -euo pipefail
          echo "Starting Terraform initialization..."
          cd terraform
          if ! terraform init -input=false -upgrade=false; then
            echo "❌ ERROR: terraform init failed"
            exit 1
          fi
          echo "✅ Terraform initialized successfully"

      - name: Get PR Number
        id: get_pr
        run: |
          # Get PR number from commit SHA using GitHub API
          PR_NUMBER=$(gh pr list --state merged --json number,mergeCommit --jq ".[] | select(.mergeCommit.oid == \"${{ github.sha }}\") | .number")
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Download Plan from S3
        if: steps.get_pr.outputs.pr_number != ''
        id: download_plan
        run: |
          set -euo pipefail
          PR_NUMBER=${{ steps.get_pr.outputs.pr_number }}
          S3_PATH="s3://tech-floripa-plan-artifacts/$PR_NUMBER/tfplan"
          echo "Attempting to download plan from $S3_PATH..."

          if aws s3 cp "$S3_PATH" terraform/tfplan; then
            echo "✅ Successfully downloaded plan from S3"
            echo "plan_downloaded=true" >> $GITHUB_OUTPUT
          else
            echo "❌ ERROR: Failed to download plan from S3!"
            echo "PR Number: #$PR_NUMBER"
            echo "S3 Path: $S3_PATH"
            echo ""
            echo "This means the reviewed plan cannot be applied."
            echo "Possible reasons:"
            echo "  - Plan was not uploaded during PR workflow"
            echo "  - S3 bucket permissions issue"
            echo "  - Plan has expired (check lifecycle policy)"
            echo ""
            echo "Command failed: aws s3 cp $S3_PATH terraform/tfplan"
            exit 1
          fi

      - name: Generate New Plan for Comparison
        if: steps.download_plan.outputs.plan_downloaded == 'true'
        run: |
          set -euo pipefail
          echo "Generating fresh plan for comparison..."
          cd terraform
          if ! terraform plan -input=false -out=tfplan-new; then
            echo "❌ ERROR: terraform plan failed"
            echo "Command: terraform plan -input=false -out=tfplan-new"
            exit 1
          fi
          echo "✅ Fresh plan generated successfully"

      - name: Verify Plan Match
        if: steps.download_plan.outputs.plan_downloaded == 'true'
        run: |
          set -euo pipefail
          echo "Verifying plan consistency..."
          cd terraform

          # Compare the two plans
          if ! terraform show -no-color tfplan > plan-old.txt; then
            echo "❌ ERROR: Failed to show downloaded plan"
            exit 1
          fi

          if ! terraform show -no-color tfplan-new > plan-new.txt; then
            echo "❌ ERROR: Failed to show fresh plan"
            exit 1
          fi

          if diff -q plan-old.txt plan-new.txt > /dev/null; then
            echo "✅ Plans match. Proceeding with apply using the reviewed plan."
            rm tfplan-new plan-new.txt plan-old.txt
          else
            echo "❌ ERROR: Current state differs from the reviewed plan!"
            echo "Differences:"
            diff plan-old.txt plan-new.txt || true
            echo ""
            echo "The infrastructure state has changed since the PR was approved."
            echo "Please create a new PR with an updated plan."
            exit 1
          fi

      - name: Terraform Apply
        run: |
          set -euo pipefail
          echo "Starting Terraform apply..."
          cd terraform

          if [ ! -f tfplan ]; then
            echo "❌ ERROR: Plan file tfplan not found"
            exit 1
          fi

          echo "Applying infrastructure changes..."
          if ! terraform apply -input=false tfplan; then
            echo "❌ ERROR: terraform apply failed"
            echo "Command: terraform apply -input=false tfplan"
            exit 1
          fi

          echo "✅ Terraform apply completed successfully"
